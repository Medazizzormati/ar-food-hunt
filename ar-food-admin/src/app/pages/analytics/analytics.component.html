<div class="page animate-in">
  <div class="page-header">
    <div>
      <h1>User Analytics</h1>
      <p class="text-muted">Detailed insights into player behavior and engagement.</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary">
        <span class="material-symbols-rounded">download</span> Export CSV
      </button>
    </div>
  </div>

  <div class="grid-2 mb-xl">
    <div class="card">
      <div class="section-header">
        <h3>Retention Rate (30 Days)</h3>
      </div>
      <div style="height: 200px; display: flex; align-items: flex-end; gap: 10px; margin-top: 20px;">
        <div *ngFor="let h of [80, 75, 70, 65, 68, 62, 58, 55]" [style.height.%]="h" style="flex: 1; background: var(--color-primary); border-radius: 4px 4px 0 0; opacity: 0.8"></div>
      </div>
    </div>
    <div class="card">
      <div class="section-header">
        <h3>Platform Distribution</h3>
      </div>
      <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 20px;">
        <div *ngFor="let p of platforms">
          <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span>{{ p.name }}</span>
            <span class="fw-600">{{ p.percentage }}%</span>
          </div>
          <div style="height: 12px; background: var(--bg-hover); border-radius: 6px; overflow: hidden;">
            <div [style.width.%]="p.percentage" [style.background]="p.color" style="height: 100%;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
