<div class="page animate-in">
  <div class="page-header">
    <div>
      <h1>Live Events & Campaigns</h1>
      <p class="text-muted">Manage global multipliers and special AR campaigns.</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" (click)="openEventDialog()">
        <span class="material-symbols-rounded">event_available</span> Create Event
      </button>
    </div>
  </div>

  <div class="card">
    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Event Name</th>
            <th>Type</th>
            <th>Multiplier</th>
            <th>Duration</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let event of events">
            <td><span class="fw-600">{{ event.name }}</span></td>
            <td>{{ event.type }}</td>
            <td><span class="badge badge-purple">{{ event.multiplier }}</span></td>
            <td>{{ event.duration }}</td>
            <td>
              <span class="badge" 
                    [ngClass]="{
                      'badge-success': event.status === 'Active', 
                      'badge-info': event.status === 'Upcoming',
                      'badge-danger': event.status === 'Ended'
                    }">
                {{ event.status }}
              </span>
            </td>
            <td>
              <div class="d-flex gap-sm">
                <button class="btn-icon" (click)="openEventDialog(event)">
                  <span class="material-symbols-rounded">edit</span>
                </button>
                <button class="btn-icon" (click)="deleteEvent(event.id)" style="color: var(--color-danger)">
                  <span class="material-symbols-rounded">delete</span>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
