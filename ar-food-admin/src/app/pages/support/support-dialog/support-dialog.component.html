<h2 mat-dialog-title>{{ isEditMode ? 'Edit Ticket' : 'Create New Ticket' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form" style="display: flex; flex-direction: column; gap: 16px; margin-top: 10px;">
    
    <mat-form-field appearance="outline">
      <mat-label>User Name</mat-label>
      <input matInput formControlName="user" placeholder="E.g. John Doe">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Issue Description</mat-label>
      <textarea matInput formControlName="issue" rows="3" placeholder="Describe the problem..."></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="Open">Open</mat-option>
        <mat-option value="In Progress">In Progress</mat-option>
        <mat-option value="Closed">Closed</mat-option>
      </mat-select>
    </mat-form-field>

  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" [disabled]="!form.valid" (click)="save()">
    {{ isEditMode ? 'Save Changes' : 'Create Ticket' }}
  </button>
</mat-dialog-actions>
