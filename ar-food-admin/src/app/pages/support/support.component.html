<div class="page animate-in">
  <div class="page-header">
    <div>
      <h1>Support Tickets</h1>
      <p class="text-muted">Manage user reports and technical issues.</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" (click)="openSupportDialog()">
        <span class="material-symbols-rounded">support_agent</span> Create Ticket
      </button>
    </div>
  </div>

  <div class="card">
    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>User</th>
            <th>Issue</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let ticket of tickets">
            <td><span class="fw-600">{{ ticket.user }}</span></td>
            <td>{{ ticket.issue }}</td>
            <td>
              <span class="badge" 
                    [ngClass]="{
                      'badge-info': ticket.status === 'Open', 
                      'badge-purple': ticket.status === 'In Progress',
                      'badge-success': ticket.status === 'Closed'
                    }">
                {{ ticket.status }}
              </span>
            </td>
            <td>
              <div class="d-flex gap-sm">
                <button class="btn-icon" (click)="openSupportDialog(ticket)">
                  <span class="material-symbols-rounded">edit</span>
                </button>
                <button class="btn-icon" (click)="deleteTicket(ticket.id)" style="color: var(--color-danger)">
                  <span class="material-symbols-rounded">delete</span>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
